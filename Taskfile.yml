version: "3"

tasks:
  default:
    desc: Show available tasks
    cmds:
      - task --list-all
    silent: true

  shell:
    desc: Open an interactive IPython session
    cmds:
      - uv run ipython

  test:
    desc: Run the full validation suite against the live lab
    cmds:
      - uv run pytest tests/ -v

  test-offline:
    desc: Run the validation suite against captured API responses
    cmds:
      - uv run pytest tests/ -v --offline

  test-bgp:
    desc: Run only the BGP-related tests
    cmds:
      - uv run pytest tests/ -v -m bgp

  report:
    desc: Run the reporting example and build a single-file Allure HTML report
    dir: examples
    cmds:
      - rm -rf allure-results allure-report
      # ignore_error so the report still builds when tests fail (pytest exits non-zero)
      - cmd: uv run pytest 003_pytest/005_reporting --alluredir=allure-results
        ignore_error: true
      - allure generate allure-results -o allure-report --single-file --clean
      - cmd: echo "Report ready -> examples/allure-report/index.html"
        silent: true
