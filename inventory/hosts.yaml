---
# Per-host intended state. The same Nornir-shaped inventory introduced in
# Session B1, with the data the validation suite checks against.
#
# `data` holds the intended state. The eAPI client reads the running state,
# and the tests compare the two.

rtr001:
  hostname: 172.29.163.101
  groups:
    - eos
  data:
    loopback_ip: 10.255.0.1/32
    interfaces:
      - name: Ethernet1
        description: Link to rtr002
        ip_address: 10.0.12.1/30
        enabled: true
    bgp:
      local_as: 65001
      peers:
        - peer_ip: 10.0.12.2
          remote_as: 65002

