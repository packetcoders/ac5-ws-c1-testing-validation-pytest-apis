---
# AutoCon 5 - flat-file device inventory, kept local to this example.
#
# A list of every lab leaf switch. Each device is a dictionary with four keys:
# name, host, platform, and pod.
#
# Naming follows the lab topology: leaf<N> is reachable at 172.29.165.<100+N>,
# so leaf1 is 172.29.165.101 and leaf70 is 172.29.165.170. Each pod holds ten
# leaves: pod1 is leaf1-leaf10, pod2 is leaf11-leaf20, and so on. The lab
# injects STUDENT_ID as the last octet of your device's IP (101-170); the pod
# field lets you select your pod's leaves straight from the data.

- name: leaf1
  host: 172.29.165.101
  platform: arista_eos
  pod: pod1
